<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armulaud – Haldus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0b0f1a;
  --surface: rgba(255,255,255,0.04);
  --border:  rgba(201,165,50,0.18);
  --text:    #f0e8d2;
  --dim:     rgba(240,232,210,0.5);
  --gold:    #c9a532;
  --gold-dim: rgba(201,165,50,0.25);
  --blue:    #4a8fdf;
  --green:   #3dd68c;
  --red:     #e05555;
  --section: #5a9fd4;
}

html, body {
  min-height: 100vh;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
}

body {
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(20,45,100,0.4) 0%, transparent 70%),
    #0b0f1a;
}

/* --- TOOLBAR --- */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: rgba(11,15,26,0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  flex-wrap: wrap;
}

.toolbar-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.05em;
  margin-right: 4px;
}

.btn {
  background: rgba(201,165,50,0.12);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: 'Lato', sans-serif;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: rgba(201,165,50,0.25); }
.btn.primary {
  background: rgba(61,214,140,0.15);
  border-color: rgba(61,214,140,0.35);
  color: var(--green);
}
.btn.primary:hover { background: rgba(61,214,140,0.3); }
.btn.danger {
  background: rgba(224,85,85,0.12);
  border-color: rgba(224,85,85,0.3);
  color: var(--red);
}
.btn.danger:hover { background: rgba(224,85,85,0.25); }
.btn.active-btn {
  background: rgba(74,143,223,0.15);
  border-color: rgba(74,143,223,0.35);
  color: var(--blue);
}
.btn.active-btn:hover { background: rgba(74,143,223,0.3); }
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.toolbar .spacer { flex: 1; }

.toolbar-badge {
  font-size: 0.68rem;
  color: var(--dim);
  background: rgba(255,255,255,0.06);
  padding: 3px 8px;
  border-radius: 4px;
}

/* --- BACK LINK --- */
.back-link {
  color: var(--dim);
  text-decoration: none;
  font-size: 0.75rem;
  transition: color 0.2s;
  cursor: pointer;
}
.back-link:hover { color: var(--gold); }

/* --- SAVE STATUS --- */
.save-status {
  font-size: 0.7rem;
  padding: 3px 10px;
  border-radius: 4px;
  transition: all 0.3s;
}
.save-status.saved {
  color: var(--green);
  background: rgba(61,214,140,0.1);
}
.save-status.saving {
  color: #d4a520;
  background: rgba(212,165,32,0.1);
  animation: blink 1s ease-in-out infinite;
}
.save-status.unsaved {
  color: var(--red);
  background: rgba(224,85,85,0.1);
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* --- STORAGE BANNER --- */
.storage-banner {
  background: rgba(224,85,85,0.15);
  border-bottom: 1px solid rgba(224,85,85,0.3);
  color: var(--red);
  text-align: center;
  padding: 8px 16px;
  font-size: 0.78rem;
}

/* --- PRESENTATION LIST VIEW --- */
.view { display: none; }
.view.active { display: block; }

.pres-list {
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.pres-list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.pres-list-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.04em;
}

.pres-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--dim);
  font-size: 0.9rem;
}

.pres-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 12px;
  transition: border-color 0.2s, background 0.2s;
}
.pres-card:hover {
  border-color: var(--gold-dim);
}
.pres-card.is-active {
  border-color: rgba(61,214,140,0.4);
  background: rgba(61,214,140,0.04);
}

.pres-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.pres-card-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--dim);
  flex-shrink: 0;
}
.pres-card.is-active .pres-card-dot {
  background: var(--green);
  box-shadow: 0 0 6px rgba(61,214,140,0.5);
}

.pres-card-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

.pres-card-date {
  font-size: 0.78rem;
  color: var(--dim);
  flex-shrink: 0;
}

.pres-card-desc {
  font-size: 0.78rem;
  color: var(--dim);
  margin-bottom: 10px;
  padding-left: 20px;
}

.pres-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 20px;
  flex-wrap: wrap;
}

.pres-card-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  color: var(--dim);
}
.pres-card-badge.active-badge {
  background: rgba(61,214,140,0.12);
  color: var(--green);
  font-weight: 700;
}

.pres-card-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

/* --- NEW PRESENTATION FORM --- */
.new-pres-form {
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: none;
}
.new-pres-form.visible { display: block; }

.new-pres-form-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 12px;
}

.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  align-items: end;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.form-field label {
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.form-field input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  outline: none;
}
.form-field input:focus { border-color: var(--gold); }

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

/* --- META SECTION --- */
.meta-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: end;
}

.meta-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.meta-field label {
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.meta-field input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  outline: none;
}
.meta-field input:focus { border-color: var(--gold); }

/* --- SECTION GROUPS --- */
.slide-list {
  padding: 12px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.section-group {
  margin-bottom: 6px;
}

.section-header-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(90,159,212,0.08);
  border: 1px solid rgba(90,159,212,0.2);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  margin-bottom: 2px;
}
.section-header-bar:hover {
  background: rgba(90,159,212,0.14);
  border-color: rgba(90,159,212,0.35);
}

.section-toggle {
  font-size: 0.7rem;
  color: var(--section);
  width: 14px;
  text-align: center;
  transition: transform 0.2s;
}
.section-toggle.expanded { transform: rotate(0deg); }
.section-toggle.collapsed { transform: rotate(-90deg); }

.section-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--section);
  letter-spacing: 0.03em;
}

.section-count {
  font-size: 0.65rem;
  color: var(--dim);
}

.section-slides {
  overflow: hidden;
  transition: max-height 0.35s ease, opacity 0.25s ease;
}
.section-slides.collapsed {
  max-height: 0 !important;
  opacity: 0;
  pointer-events: none;
}
.section-slides.expanded {
  opacity: 1;
}

.section-slides-inner {
  padding: 4px 0 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* --- INSERT LINE --- */
.insert-line {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 16px;
  position: relative;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
}
.section-slides-inner:hover .insert-line,
.insert-line:hover {
  opacity: 1;
}
.insert-line::before {
  content: '';
  position: absolute;
  left: 20px;
  right: 20px;
  height: 1px;
  background: var(--gold-dim);
}
.insert-line-btn {
  position: relative;
  z-index: 2;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(201,165,50,0.15);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-size: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}
.insert-line-btn:hover {
  background: rgba(201,165,50,0.35);
  transform: scale(1.2);
}

/* --- SLIDE CARD --- */
.slide-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  transition: border-color 0.2s, opacity 0.2s;
}
.slide-card:hover { border-color: var(--gold-dim); }
.slide-card.is-section { border-left: 3px solid var(--section); }
.slide-card.is-bible   { border-left: 3px solid var(--gold); }
.slide-card.is-hidden  { opacity: 0.45; }

.slide-card-body {
  display: flex;
  gap: 14px;
}

.slide-left {
  flex: 0 0 60%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.slide-right {
  flex: 0 0 38%;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Header row */
.slide-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.slide-id {
  font-size: 0.62rem;
  color: var(--dim);
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  padding: 2px 6px;
  min-width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.slide-type-select,
.projector-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 6px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.7rem;
  outline: none;
}
.slide-type-select:focus,
.projector-select:focus { border-color: var(--gold); }
.projector-select { color: var(--dim); }

.slide-section-input {
  background: var(--surface);
  border: 1px solid rgba(90,159,212,0.25);
  color: var(--section);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.7rem;
  outline: none;
  max-width: 140px;
  min-width: 80px;
}

.slide-hint-input {
  background: rgba(201,165,50,0.05);
  border: 1px solid rgba(201,165,50,0.15);
  color: var(--gold);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.68rem;
  font-style: italic;
  outline: none;
  min-width: 100px;
  flex: 1;
}
.slide-hint-input::placeholder { color: rgba(201,165,50,0.3); }
.slide-hint-input:focus { border-color: var(--gold); }

.slide-actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.btn-icon {
  background: none;
  border: 1px solid transparent;
  color: var(--dim);
  cursor: pointer;
  font-size: 0.78rem;
  padding: 2px 5px;
  border-radius: 4px;
  transition: all 0.2s;
  line-height: 1;
}
.btn-icon:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.btn-icon.delete:hover { color: var(--red); }
.btn-icon.hidden-toggle.is-hidden { color: var(--red); opacity: 0.6; }

/* Text fields */
.field-row {
  display: flex;
  gap: 6px;
  align-items: start;
}

.field-label {
  font-size: 0.58rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  min-width: 22px;
  padding-top: 7px;
  flex-shrink: 0;
}

.field-textarea {
  flex: 1;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text);
  padding: 6px 9px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  line-height: 1.45;
  resize: none;
  min-height: 32px;
  overflow: hidden;
  outline: none;
}
.field-textarea:focus { border-color: var(--gold-dim); }

.slide-time {
  font-size: 0.55rem;
  color: var(--dim);
  text-align: right;
  margin-top: 2px;
}

/* --- MINI PROJECTOR PREVIEW --- */
.projector-preview {
  width: 160px;
  height: 90px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Lato', sans-serif;
  position: relative;
  flex-shrink: 0;
}

.projector-preview.type-none {
  background: rgba(0,0,0,0.4);
}
.projector-preview.type-none .preview-text {
  color: rgba(255,255,255,0.15);
  font-size: 1.5rem;
}

.projector-preview.type-inherit {
  background: rgba(74,143,223,0.08);
  border: 1px dashed rgba(74,143,223,0.3);
}
.projector-preview.type-inherit .preview-text {
  color: var(--blue);
  font-size: 0.6rem;
  text-align: center;
  opacity: 0.7;
}

.projector-preview.type-section {
  background: linear-gradient(135deg, rgba(90,159,212,0.15), rgba(90,159,212,0.05));
  padding: 6px;
  flex-direction: column;
  text-align: center;
}
.projector-preview.type-section .preview-section-text {
  font-size: 0.55rem;
  color: var(--section);
  font-weight: 700;
  line-height: 1.3;
}

.projector-preview.type-bible {
  background: linear-gradient(135deg, rgba(74,143,223,0.15), rgba(74,143,223,0.05));
  padding: 6px;
  flex-direction: column;
  gap: 2px;
  align-items: flex-start;
  justify-content: center;
}
.projector-preview.type-bible .preview-ref {
  font-size: 0.45rem;
  color: var(--blue);
  font-weight: 700;
  letter-spacing: 0.04em;
}
.projector-preview.type-bible .preview-verse {
  font-size: 0.4rem;
  color: rgba(240,232,210,0.6);
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.projector-preview.type-keytext {
  background: linear-gradient(135deg, rgba(20,35,70,0.9), rgba(10,20,50,0.9));
  padding: 6px;
  flex-direction: column;
  text-align: center;
}
.projector-preview.type-keytext .preview-keytext {
  font-size: 0.48rem;
  color: var(--text);
  font-weight: 700;
  line-height: 1.3;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
.projector-preview.type-keytext .preview-sub {
  font-size: 0.38rem;
  color: var(--dim);
  margin-top: 2px;
}

.projector-preview.type-image {
  background-size: cover;
  background-position: center;
}
.projector-preview.type-image .preview-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}
.projector-preview.type-image .preview-caption {
  position: relative;
  z-index: 1;
  font-size: 0.42rem;
  color: rgba(255,255,255,0.7);
  text-align: center;
}

.projector-preview.type-image-keytext {
  background-size: cover;
  background-position: center;
}
.projector-preview.type-image-keytext .preview-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}
.projector-preview.type-image-keytext .preview-keytext {
  position: relative;
  z-index: 1;
  font-size: 0.48rem;
  color: var(--text);
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  padding: 4px;
}

/* --- PROJECTOR CONTENT FIELDS --- */
.projector-fields {
  padding: 8px;
  background: rgba(74,143,223,0.06);
  border: 1px solid rgba(74,143,223,0.15);
  border-radius: 5px;
}
.projector-fields-title {
  font-size: 0.58rem;
  color: var(--section);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.pc-field-row {
  display: flex;
  gap: 6px;
  align-items: start;
  margin-bottom: 4px;
}
.pc-field-row:last-child { margin-bottom: 0; }

.pc-label {
  font-size: 0.55rem;
  color: var(--dim);
  letter-spacing: 0.06em;
  min-width: 58px;
  padding-top: 6px;
  flex-shrink: 0;
  text-transform: uppercase;
}

.pc-input {
  flex: 1;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.78rem;
  line-height: 1.4;
  resize: none;
  min-height: 28px;
  overflow: hidden;
  outline: none;
}
.pc-input:focus { border-color: rgba(74,143,223,0.4); }

/* Overlay slider */
.overlay-slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.overlay-slider-row label {
  font-size: 0.55rem;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  min-width: 58px;
  flex-shrink: 0;
}
.overlay-slider-row input[type="range"] {
  flex: 1;
  accent-color: var(--blue);
  height: 4px;
}
.overlay-slider-row .overlay-value {
  font-size: 0.65rem;
  color: var(--dim);
  min-width: 30px;
  text-align: right;
}

/* --- PROJECTOR SPAN --- */
.span-checkbox-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.span-label {
  font-size: 0.65rem;
  color: var(--dim);
  letter-spacing: 0.04em;
}
.span-input {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 6px;
  border-radius: 4px;
  font-family: 'Lato', sans-serif;
  font-size: 0.7rem;
  width: 42px;
  text-align: center;
  outline: none;
}
.span-input:focus { border-color: var(--gold); }

/* --- FLOW INDICATOR --- */
.flow-indicator {
  font-size: 0.55rem;
  padding: 2px 7px;
  border-radius: 3px;
  display: inline-block;
  margin-top: 4px;
}
.flow-indicator.flow-next {
  color: var(--blue);
  background: rgba(74,143,223,0.1);
  border: 1px solid rgba(74,143,223,0.2);
}
.flow-indicator.flow-prev {
  color: var(--gold);
  background: rgba(201,165,50,0.08);
  border: 1px solid rgba(201,165,50,0.15);
}

/* --- SPAN INDICATORS --- */
.span-badge {
  font-size: 0.55rem;
  padding: 2px 7px;
  border-radius: 3px;

<script type="module">
import { db, storage } from './js/firebase-config.js';
import { ref, get, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
import { ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

// =============================================================
//  STATE
// =============================================================
let presentations = {};
let activePresId = null;
let currentPresId = null;
let slides = [];
let meta = { title: '', date: '', description: '' };
let collapsedSections = {};
let saveTimer = null;
let dirty = false;
let storageAvailable = true;

// =============================================================
//  STORAGE CHECK (Task 8)
// =============================================================
(function checkStorage() {
  try {
    const testRef = storageRef(storage, 'test/.keep');
    // If no error thrown, storage module is available
  } catch (e) {
    storageAvailable = false;
    document.getElementById('storageBanner').classList.remove('hidden');
  }
})();

// =============================================================
//  UTILITIES
// =============================================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function autosize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function generatePresId() {
  // Use date-based ID if possible, otherwise timestamp
  const now = new Date();
  const base = now.getFullYear() + '-'
    + String(now.getMonth() + 1).padStart(2, '0') + '-'
    + String(now.getDate()).padStart(2, '0');
  // If this ID already exists, append time
  if (presentations[base]) {
    return base + '-' + String(now.getHours()).padStart(2, '0')
      + String(now.getMinutes()).padStart(2, '0');
  }
  return base;
}

function ensureArray(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  return Object.keys(data).map(k => data[k]);
}

// =============================================================
//  VIEW SWITCHING
// =============================================================
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

// =============================================================
//  VIEW A: PRESENTATIONS LIST
// =============================================================

// Listen to /presentations and /activePresentation
onValue(ref(db, 'presentations'), snap => {
  presentations = snap.val() || {};
  if (document.getElementById('viewList').classList.contains('active')) {
    renderPresList();
  }
});

onValue(ref(db, 'activePresentation'), snap => {
  activePresId = snap.val() || null;
  if (document.getElementById('viewList').classList.contains('active')) {
    renderPresList();
  }
});

function renderPresList() {
  const container = document.getElementById('presCards');
  const empty = document.getElementById('presEmpty');
  const ids = Object.keys(presentations);

  if (ids.length === 0) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  // Sort by date descending (use meta.date or ID)
  ids.sort((a, b) => {
    const da = (presentations[a].meta && presentations[a].meta.date) || a;
    const db2 = (presentations[b].meta && presentations[b].meta.date) || b;
    return db2.localeCompare(da);
  });

  let html = '';
  ids.forEach(id => {
    const pres = presentations[id];
    const m = pres.meta || {};
    const isActive = (id === activePresId);
    const slideData = pres.slides ? ensureArray(pres.slides) : [];
    const slideCountNum = slideData.length;

    html += '<div class="pres-card' + (isActive ? ' is-active' : '') + '" data-pres-id="' + esc(id) + '">';
    html += '<div class="pres-card-header">';
    html += '<div class="pres-card-dot"></div>';
    html += '<div class="pres-card-title">' + esc(m.title || id) + '</div>';
    html += '<div class="pres-card-date">' + esc(m.date || '') + '</div>';
    html += '</div>';
    if (m.description) {
      html += '<div class="pres-card-desc">' + esc(m.description) + '</div>';
    }
    html += '<div class="pres-card-meta">';
    html += '<span class="pres-card-badge">' + slideCountNum + ' slaidi</span>';
    if (isActive) {
      html += '<span class="pres-card-badge active-badge">Aktiivne</span>';
    }
    html += '<div class="pres-card-actions">';
    html += '<button class="btn" data-action="edit" data-id="' + esc(id) + '">Muuda slaide</button>';
    if (!isActive) {
      html += '<button class="btn active-btn" data-action="activate" data-id="' + esc(id) + '">Aktiveeri</button>';
    }
    if (!isActive) {
      html += '<button class="btn danger" data-action="delete" data-id="' + esc(id) + '">Kustuta</button>';
    }
    html += '</div>';
    html += '</div>';
    html += '</div>';
  });

  container.innerHTML = html;

  // Attach events
  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const action = btn.getAttribute('data-action');
      const id = btn.getAttribute('data-id');

      if (action === 'edit') {
        openEditor(id);
      } else if (action === 'activate') {
        activatePresentation(id);
      } else if (action === 'delete') {
        deletePresentation(id);
      }
    });
  });
}

// New presentation form
document.getElementById('btnNewPres').addEventListener('click', () => {
  const form = document.getElementById('newPresForm');
  form.classList.toggle('visible');
  if (form.classList.contains('visible')) {
    // Pre-fill date with today
    const now = new Date();
    const dd = String(now.getDate()).padStart(2, '0');
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const yyyy = now.getFullYear();
    document.getElementById('newPresDate').value = dd + '.' + mm + '.' + yyyy;
    document.getElementById('newPresTitle').value = '';
    document.getElementById('newPresDesc').value = '';
    document.getElementById('newPresTitle').focus();
  }
});

document.getElementById('btnCancelPres').addEventListener('click', () => {
  document.getElementById('newPresForm').classList.remove('visible');
});

document.getElementById('btnCreatePres').addEventListener('click', async () => {
  const title = document.getElementById('newPresTitle').value.trim();
  const date = document.getElementById('newPresDate').value.trim();
  const desc = document.getElementById('newPresDesc').value.trim();

  if (!title) {
    alert('Pealkiri on kohustuslik.');
    return;
  }

  const id = generatePresId();
  const now = Date.now();

  const presData = {
    meta: {
      title: title,
      date: date,
      description: desc,
      createdAt: now,
      updatedAt: now
    },
    slides: [
      {
        id: 0,
        type: 'section-header',
        section: '1. Sissejuhatus',
        estonian: '1. Sissejuhatus',
        russian: '',
        projector: 'section',
        projectorSpan: false,
        projectorContent: {
          sectionEst: '1. Sissejuhatus',
          sectionRus: ''
        }
      }
    ]
  };

  try {
    await set(ref(db, 'presentations/' + id), presData);
    document.getElementById('newPresForm').classList.remove('visible');
  } catch (err) {
    alert('Viga teenistuse loomisel: ' + err.message);
  }
});

async function activatePresentation(id) {
  try {
    await set(ref(db, 'activePresentation'), id);
  } catch (err) {
    alert('Viga aktiveerimisel: ' + err.message);
  }
}

async function deletePresentation(id) {
  if (id === activePresId) {
    alert('Aktiivset teenistust ei saa kustutada.');
    return;
  }
  if (!confirm('Kas oled kindel, et soovid teenistuse kustutada?')) return;
  try {
    await remove(ref(db, 'presentations/' + id));
  } catch (err) {
    alert('Viga kustutamisel: ' + err.message);
  }
}

// =============================================================
//  VIEW B: SLIDE EDITOR
// =============================================================
let editorListener = null;

function openEditor(presId) {
  currentPresId = presId;
  dirty = false;
  collapsedSections = {};
  updateSaveStatus('saved');
  showView('viewEditor');

  // Load data
  const presRef = ref(db, 'presentations/' + presId);

  // Remove previous listener
  if (editorListener) {
    editorListener();
    editorListener = null;
  }

  // Initial load
  get(presRef).then(snap => {
    const data = snap.val();
    if (!data) {
      alert('Teenistust ei leitud.');
      goBackToList();
      return;
    }

    meta = data.meta || {};
    slides = ensureArray(data.slides);
    renderEditorMeta();
    renderEditorTitle();
    renderSlides();
  }).catch(err => {
    alert('Viga laadimisel: ' + err.message);
    goBackToList();
  });
}

function goBackToList() {
  if (editorListener) {
    editorListener();
    editorListener = null;
  }
  if (dirty) {
    if (confirm('Sul on salvestamata muudatusi. Kas soovid enne salvestada?')) {
      saveToFirebase();
    }
  }
  currentPresId = null;
  slides = [];
  meta = {};
  dirty = false;
  showView('viewList');
  renderPresList();
}

document.getElementById('btnBack').addEventListener('click', goBackToList);

function renderEditorTitle() {
  const title = meta.title || currentPresId;
  const date = meta.date || '';
  document.getElementById('editorTitle').textContent = (date ? date + ' \u2013 ' : '') + title;
}

function renderEditorMeta() {
  document.getElementById('metaTitle').value = meta.title || '';
  document.getElementById('metaDate').value = meta.date || '';
  document.getElementById('metaDesc').value = meta.description || '';
}

function readEditorMeta() {
  meta.title = document.getElementById('metaTitle').value;
  meta.date = document.getElementById('metaDate').value;
  meta.description = document.getElementById('metaDesc').value;
}

// Meta field change listeners
['metaTitle', 'metaDate', 'metaDesc'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    readEditorMeta();
    renderEditorTitle();
    markDirty();
  });
});

// =============================================================
//  SAVE LOGIC
// =============================================================
function markDirty() {
  dirty = true;
  updateSaveStatus('unsaved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveToFirebase();
  }, 1500);
}

function updateSaveStatus(status) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + status;
  if (status === 'saved') {
    el.innerHTML = 'Salvestatud &#10003;';
  } else if (status === 'saving') {
    el.textContent = 'Salvestamine...';
  } else if (status === 'unsaved') {
    el.textContent = 'Salvestamata muudatused';
  }
}

async function saveToFirebase() {
  if (!currentPresId) return;
  clearTimeout(saveTimer);
  updateSaveStatus('saving');

  readEditorMeta();
  meta.updatedAt = Date.now();

  // Clean slides for saving
  const cleanSlides = slides.map((s, idx) => {
    const obj = {};
    obj.id = idx;
    if (s.type) obj.type = s.type;
    if (s.section) obj.section = s.section;
    if (s.estonian !== undefined) obj.estonian = s.estonian || '';
    if (s.russian !== undefined) obj.russian = s.russian || '';
    obj.projector = s.projector || 'none';
    if (s.hint) obj.hint = s.hint;
    if (s.hidden) obj.hidden = true;
    // projectorSpan: store as number, only if > 1
    const spanNum = typeof s.projectorSpan === 'number' ? s.projectorSpan : (s.projectorSpan === true ? 2 : 1);
    if (spanNum > 1) obj.projectorSpan = spanNum;

    if (s.projectorContent && Object.keys(s.projectorContent).length > 0) {
      const pc = {};
      Object.keys(s.projectorContent).forEach(k => {
        const v = s.projectorContent[k];
        if (v !== '' && v !== null && v !== undefined) {
          pc[k] = v;
        }
      });
      if (Object.keys(pc).length > 0) {
        obj.projectorContent = pc;
      }
    }

    return obj;
  });

  try {
    await set(ref(db, 'presentations/' + currentPresId + '/meta'), meta);
    await set(ref(db, 'presentations/' + currentPresId + '/slides'), cleanSlides);
    dirty = false;
    updateSaveStatus('saved');
  } catch (err) {
    console.error('Save failed:', err);
    updateSaveStatus('unsaved');
    alert('Salvestamine eba\u00F5nnestus: ' + err.message);
  }
}

document.getElementById('btnSave').addEventListener('click', () => {
  saveToFirebase();
});

// Ctrl+S: Save
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('viewEditor').classList.contains('active')) {
      saveToFirebase();
    }
  }
});

// =============================================================
//  IMAGE COMPRESSION + UPLOAD
// =============================================================
async function compressImage(file, options) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      const ratio = Math.min(options.maxWidth / width, options.maxHeight / height, 1);
      width = Math.round(width * ratio);
      height = Math.round(height * ratio);
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => resolve(blob), 'image/webp', options.quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function uploadImage(file, presentationId, progressCallback) {
  // 1. Compress
  if (progressCallback) progressCallback('compress', 0);
  const compressed = await compressImage(file, {
    maxWidth: 1920,
    maxHeight: 1080,
    quality: 0.82
  });

  // 2. Build path
  const safeName = file.name.replace(/[^a-zA-Z0-9.\-]/g, '_').toLowerCase();
  const fileName = Date.now() + '_' + safeName.replace(/\.[^.]+$/, '') + '.webp';
  const path = 'images/' + presentationId + '/' + fileName;

  // 3. Upload with progress
  const fileRef = storageRef(storage, path);
  const uploadTask = uploadBytesResumable(fileRef, compressed);

  return new Promise((resolve, reject) => {
    uploadTask.on('state_changed',
      (snapshot) => {
        const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        if (progressCallback) progressCallback('upload', pct);
      },
      (error) => {
        reject(error);
      },
      async () => {
        try {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          if (progressCallback) progressCallback('done', 100);
          resolve(url);
        } catch (e) {
          reject(e);
        }
      }
    );
  });
}

// =============================================================
//  SLIDE RENDERING
// =============================================================
function getSections() {
  const sections = [];
  const seen = {};
  for (let i = 0; i < slides.length; i++) {
    const sec = slides[i].section || '(ilma sektsioonita)';
    if (!seen[sec]) {
      seen[sec] = true;
      sections.push(sec);
    }
  }
  return sections;
}

function getSlidesForSection(sectionName) {
  const result = [];
  for (let i = 0; i < slides.length; i++) {
    const sec = slides[i].section || '(ilma sektsioonita)';
    if (sec === sectionName) {
      result.push({ slide: slides[i], globalIndex: i });
    }
  }
  return result;
}

function renderSlides() {
  readEditorMeta();
  const list = document.getElementById('slideList');
  list.innerHTML = '';

  document.getElementById('slideCount').textContent = slides.length + ' slaidi';

  const sections = getSections();

  sections.forEach(sectionName => {
    const sectionSlides = getSlidesForSection(sectionName);
    if (sectionSlides.length === 0) return;

    const isCollapsed = collapsedSections[sectionName] !== false;

    const group = document.createElement('div');
    group.className = 'section-group';

    // Section header bar
    const header = document.createElement('div');
    header.className = 'section-header-bar';
    header.innerHTML =
      '<span class="section-toggle ' + (isCollapsed ? 'collapsed' : 'expanded') + '">' +
        (isCollapsed ? '&#9654;' : '&#9660;') +
      '</span>' +
      '<span class="section-name">' + esc(sectionName) + '</span>' +
      '<span class="section-count">(' + sectionSlides.length + ' slaidi)</span>';

    header.addEventListener('click', () => {
      collapsedSections[sectionName] = !isCollapsed;
      renderSlides();
    });

    group.appendChild(header);

    // Slides container
    const slidesContainer = document.createElement('div');
    slidesContainer.className = 'section-slides ' + (isCollapsed ? 'collapsed' : 'expanded');

    const inner = document.createElement('div');
    inner.className = 'section-slides-inner';

    sectionSlides.forEach(item => {
      const insertLine = createInsertLine(item.globalIndex);
      inner.appendChild(insertLine);

      const card = createSlideCard(item.slide, item.globalIndex);
      inner.appendChild(card);
    });

    // Insert line after last slide
    if (sectionSlides.length > 0) {
      const lastGlobal = sectionSlides[sectionSlides.length - 1].globalIndex;
      const insertAfterLast = createInsertLine(lastGlobal + 1);
      inner.appendChild(insertAfterLast);
    }

    slidesContainer.appendChild(inner);
    if (!isCollapsed) {
      slidesContainer.style.maxHeight = 'none';
    }
    group.appendChild(slidesContainer);
    list.appendChild(group);
  });

  // If no slides at all, show an insert line
  if (slides.length === 0) {
    const insertLine = createInsertLine(0);
    insertLine.style.opacity = '1';
    insertLine.style.height = '40px';
    list.appendChild(insertLine);
  }

  // Auto-resize all textareas
  list.querySelectorAll('textarea').forEach(ta => autosize(ta));
}

function createInsertLine(insertAtIndex) {
  const line = document.createElement('div');
  line.className = 'insert-line';
  line.innerHTML = '<div class="insert-line-btn">+</div>';
  line.addEventListener('click', e => {
    e.stopPropagation();
    let surroundingSection = '';
    if (insertAtIndex > 0 && insertAtIndex <= slides.length) {
      surroundingSection = slides[insertAtIndex - 1].section || '';
    } else if (insertAtIndex < slides.length) {
      surroundingSection = slides[insertAtIndex].section || '';
    }
    const newSlide = {
      type: 'normal',
      section: surroundingSection,
      estonian: '',
      russian: '',
      projector: 'none',
      projectorSpan: false
    };
    slides.splice(insertAtIndex, 0, newSlide);
    collapsedSections[surroundingSection] = false;
    markDirty();
    renderSlides();
  });
  return line;
}

function createSlideCard(slide, globalIndex) {
  const card = document.createElement('div');
  card.className = 'slide-card';
  if (slide.type === 'section-header') card.classList.add('is-section');
  if (slide.type === 'bible') card.classList.add('is-bible');
  if (slide.hidden) card.classList.add('is-hidden');

  let html = '';

  // Header row
  html += '<div class="slide-header">';
  html += '<span class="slide-id">#' + globalIndex + '</span>';

  // Type selector
  html += '<select class="slide-type-select" data-i="' + globalIndex + '" data-field="type">';
  ['normal', 'section-header', 'bible'].forEach(t => {
    html += '<option value="' + t + '"' + (slide.type === t ? ' selected' : '') + '>' + t + '</option>';
  });
  html += '</select>';

  // Section input
  html += '<input class="slide-section-input" data-i="' + globalIndex + '" data-field="section" value="' + esc(slide.section || '') + '" placeholder="Sektsioon">';

  // Hint input
  html += '<input class="slide-hint-input" data-i="' + globalIndex + '" data-field="hint" value="' + esc(slide.hint || '') + '" placeholder="Suunav tekst">';

  // Actions
  html += '<div class="slide-actions">';
  html += '<button class="btn-icon hidden-toggle' + (slide.hidden ? ' is-hidden' : '') + '" data-action="toggle-hidden" data-i="' + globalIndex + '" title="Peida/N\u00E4ita">';
  html += slide.hidden ? '&#9673;' : '&#9678;';
  html += '</button>';
  html += '<button class="btn-icon" data-action="up" data-i="' + globalIndex + '" title="Liiguta \u00FCles">&#9650;</button>';
  html += '<button class="btn-icon" data-action="down" data-i="' + globalIndex + '" title="Liiguta alla">&#9660;</button>';
  html += '<button class="btn-icon delete" data-action="delete" data-i="' + globalIndex + '" title="Kustuta">&#10005;</button>';
  html += '</div>';
  html += '</div>';

  // Two-column body
  html += '<div class="slide-card-body">';

  // LEFT COLUMN
  html += '<div class="slide-left">';
  html += '<div class="field-row">';
  html += '<span class="field-label">ET</span>';
  html += '<textarea class="field-textarea" data-i="' + globalIndex + '" data-field="estonian" rows="1">' + esc(slide.estonian || '') + '</textarea>';
  html += '</div>';
  html += '<div class="field-row">';
  html += '<span class="field-label">RU</span>';
  html += '<textarea class="field-textarea" data-i="' + globalIndex + '" data-field="russian" rows="1">' + esc(slide.russian || '') + '</textarea>';
  html += '</div>';

  // Flow indicators
  html += buildFlowIndicator(globalIndex);

  html += '<div class="slide-time">~4s</div>';
  html += '</div>';

  // RIGHT COLUMN
  html += '<div class="slide-right">';

  // Projector type selector
  const projVal = slide.projector || 'none';
  html += '<select class="projector-select" data-i="' + globalIndex + '" data-field="projector" style="margin-bottom:6px;">';
  ['none', 'inherit', 'section', 'bible', 'keytext', 'image', 'image-keytext'].forEach(t => {
    html += '<option value="' + t + '"' + (projVal === t ? ' selected' : '') + '>' + t + '</option>';
  });
  html += '</select>';

  // projectorSpan (shown when projector is not 'none' and not 'inherit')
  if (projVal !== 'none' && projVal !== 'inherit') {
    const spanVal = typeof slide.projectorSpan === 'number' ? slide.projectorSpan : (slide.projectorSpan === true ? 2 : 1);
    html += '<div class="span-checkbox-row">';
    html += '<span class="span-label">Kestus:</span>';
    html += '<input type="number" class="span-input" data-i="' + globalIndex + '" data-field="projectorSpan" min="1" max="20" value="' + spanVal + '">';
    html += '<span class="span-label">slaidi</span>';
    html += '</div>';
  }

  // Mini projector preview
  html += buildProjectorPreview(slide);

  // Projector content fields
  html += buildProjectorFields(slide, globalIndex);

  html += '</div>';
  html += '</div>';

  card.innerHTML = html;

  // --- ATTACH EVENTS ---
  // Direct field inputs
  card.querySelectorAll('[data-field]').forEach(el => {
    const field = el.getAttribute('data-field');
    const idx = parseInt(el.getAttribute('data-i'), 10);

    if (field === 'projectorSpan') {
      // Number input
      el.addEventListener('change', () => {
        const val = parseInt(el.value, 10);
        slides[idx].projectorSpan = isNaN(val) || val < 1 ? 1 : val;
        markDirty();
        renderSlides();
      });
      return;
    }

    el.addEventListener('input', () => {
      slides[idx][field] = el.value;
      if (el.tagName === 'TEXTAREA') autosize(el);
      markDirty();
    });

    el.addEventListener('change', () => {
      slides[idx][field] = el.value;
      if (field === 'type' || field === 'projector' || field === 'section') {
        markDirty();
        renderSlides();
      }
    });
  });

  // Projector content fields
  card.querySelectorAll('[data-pc]').forEach(el => {
    const idx = parseInt(el.getAttribute('data-pci'), 10);
    const key = el.getAttribute('data-pc');

    el.addEventListener('input', () => {
      if (!slides[idx].projectorContent) slides[idx].projectorContent = {};
      slides[idx].projectorContent[key] = el.value;
      if (el.tagName === 'TEXTAREA') autosize(el);
      updatePreviewInCard(card, slides[idx]);
      markDirty();
    });
  });

  // Overlay slider
  const overlaySlider = card.querySelector('[data-overlay]');
  if (overlaySlider) {
    const idx = parseInt(overlaySlider.getAttribute('data-overlay-i'), 10);
    overlaySlider.addEventListener('input', function() {
      if (!slides[idx].projectorContent) slides[idx].projectorContent = {};
      slides[idx].projectorContent.overlay = parseInt(this.value, 10);
      const valDisplay = card.querySelector('.overlay-value');
      if (valDisplay) valDisplay.textContent = this.value + '%';
      const overlayEl = card.querySelector('.preview-overlay');
      if (overlayEl) {
        overlayEl.style.background = 'rgba(0,0,0,' + (parseInt(this.value, 10) / 100) + ')';
      }
      markDirty();
    });
  }

  // Image upload buttons
  card.querySelectorAll('[data-upload-trigger]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-upload-i'), 10);
      const fileInput = card.querySelector('[data-upload-input="' + idx + '"]');
      if (fileInput) fileInput.click();
    });
  });

  card.querySelectorAll('[data-upload-input]').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const idx = parseInt(input.getAttribute('data-upload-input'), 10);

      const uploadBtn = card.querySelector('[data-upload-trigger][data-upload-i="' + idx + '"]');
      const cancelBtn = card.querySelector('[data-upload-cancel="' + idx + '"]');
      const statusEl = card.querySelector('[data-upload-status="' + idx + '"]');
      const progressBar = card.querySelector('[data-upload-progress="' + idx + '"]');
      const progressFill = progressBar ? progressBar.querySelector('.upload-progress-bar') : null;
      const errorEl = card.querySelector('[data-upload-error="' + idx + '"]');

      // Clear previous error
      if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }

      if (!storageAvailable) {
        if (errorEl) { errorEl.textContent = 'Firebase Storage pole saadaval. Mine Firebase Console \u2192 Storage \u2192 Get Started.'; errorEl.classList.remove('hidden'); }
        input.value = '';
        return;
      }

      if (uploadBtn) uploadBtn.disabled = true;
      if (cancelBtn) cancelBtn.classList.remove('hidden');
      if (statusEl) statusEl.textContent = 'Kompressitakse...';
      if (progressBar) progressBar.classList.add('visible');

      // Store uploadTask reference for cancel
      let currentUploadTask = null;
      let cancelled = false;

      // Cancel handler
      const cancelHandler = () => {
        cancelled = true;
        if (currentUploadTask) currentUploadTask.cancel();
        if (statusEl) statusEl.textContent = 'Katkestatud';
        if (uploadBtn) uploadBtn.disabled = false;
        if (cancelBtn) cancelBtn.classList.add('hidden');
        if (progressBar) progressBar.classList.remove('visible');
        input.value = '';
      };
      if (cancelBtn) cancelBtn.addEventListener('click', cancelHandler, { once: true });

      try {
        // 1. Compress
        const compressed = await compressImage(file, {
          maxWidth: 1920, maxHeight: 1080, quality: 0.82
        });

        if (cancelled) return;

        // 2. Upload
        const safeName = file.name.replace(/[^a-zA-Z0-9.\-]/g, '_').toLowerCase();
        const fileName = Date.now() + '_' + safeName.replace(/\.[^.]+$/, '') + '.webp';
        const path = 'images/' + currentPresId + '/' + fileName;
        const fileRef = storageRef(storage, path);
        currentUploadTask = uploadBytesResumable(fileRef, compressed);

        const url = await new Promise((resolve, reject) => {
          currentUploadTask.on('state_changed',
            (snapshot) => {
              const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
              if (statusEl) statusEl.textContent = 'Laetakse \u00FCles... ' + pct + '%';
              if (progressFill) progressFill.style.width = pct + '%';
            },
            (error) => {
              if (error.code === 'storage/canceled') {
                reject(new Error('Katkestatud'));
              } else {
                reject(error);
              }
            },
            async () => {
              try {
                const downloadUrl = await getDownloadURL(currentUploadTask.snapshot.ref);
                resolve(downloadUrl);
              } catch (e) {
                reject(e);
              }
            }
          );
        });

        if (cancelled) return;

        if (statusEl) statusEl.textContent = 'Valmis!';
        if (progressFill) progressFill.style.width = '100%';

        // Set imageUrl
        if (!slides[idx].projectorContent) slides[idx].projectorContent = {};
        slides[idx].projectorContent.imageUrl = url;

        // Update the imageUrl field if visible
        const urlField = card.querySelector('[data-pc="imageUrl"][data-pci="' + idx + '"]');
        if (urlField) urlField.value = url;

        markDirty();
        // Re-render to update preview
        setTimeout(() => renderSlides(), 500);
      } catch (err) {
        if (!cancelled) {
          const msg = err.message || String(err);
          if (errorEl) { errorEl.textContent = '\u00DCleslaadimise viga: ' + msg; errorEl.classList.remove('hidden'); }
          if (statusEl) statusEl.textContent = 'Viga!';
        }
      } finally {
        if (uploadBtn) uploadBtn.disabled = false;
        if (cancelBtn) { cancelBtn.classList.add('hidden'); cancelBtn.removeEventListener('click', cancelHandler); }
        input.value = '';
        setTimeout(() => {
          if (progressBar) progressBar.classList.remove('visible');
        }, 1500);
      }
    });
  });

  // Action buttons
  card.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.getAttribute('data-i'), 10);
      const action = btn.getAttribute('data-action');

      if (action === 'up' && idx > 0) {
        const tmp = slides[idx];
        slides[idx] = slides[idx - 1];
        slides[idx - 1] = tmp;
        markDirty();
        renderSlides();
      } else if (action === 'down' && idx < slides.length - 1) {
        const tmp = slides[idx];
        slides[idx] = slides[idx + 1];
        slides[idx + 1] = tmp;
        markDirty();
        renderSlides();
      } else if (action === 'delete') {
        if (confirm('Kustuta slaid #' + idx + '?')) {
          slides.splice(idx, 1);
          markDirty();
          renderSlides();
        }
      } else if (action === 'toggle-hidden') {
        slides[idx].hidden = !slides[idx].hidden;
        markDirty();
        renderSlides();
      }
    });
  });

  return card;
}

function updatePreviewInCard(card, slide) {
  const previewEl = card.querySelector('.projector-preview');
  if (previewEl) {
    previewEl.outerHTML = buildProjectorPreview(slide);
  }
}

// =============================================================
//  PROJECTOR PREVIEW
// =============================================================
function buildProjectorPreview(slide) {
  const projector = slide.projector || 'none';
  const pc = slide.projectorContent || {};
  let html = '';

  if (projector === 'none') {
    html = '<div class="projector-preview type-none"><span class="preview-text">&mdash;</span></div>';

  } else if (projector === 'inherit') {
    html = '<div class="projector-preview type-inherit"><span class="preview-text">&larr; P\u00E4rib eelmist projektorit</span></div>';

  } else if (projector === 'section') {
    html = '<div class="projector-preview type-section">';
    html += '<div class="preview-section-text">' + esc(pc.sectionEst || '') + '</div>';
    html += '</div>';

  } else if (projector === 'bible') {
    html = '<div class="projector-preview type-bible">';
    html += '<div class="preview-ref">' + esc(pc.reference || '') + '</div>';
    html += '<div class="preview-verse">' + esc(pc.textEst || '') + '</div>';
    html += '</div>';

  } else if (projector === 'keytext') {
    html = '<div class="projector-preview type-keytext">';
    html += '<div class="preview-keytext">' + esc(pc.textEst || '') + '</div>';
    if (pc.textRus) {
      html += '<div class="preview-sub" style="font-style:italic;">' + esc(pc.textRus) + '</div>';
    }
    if (pc.subEst) {
      html += '<div class="preview-sub">' + esc(pc.subEst) + '</div>';
    }
    html += '</div>';

  } else if (projector === 'image') {
    const overlay = pc.overlay != null ? pc.overlay : 60;
    let bgStyle = '';
    if (pc.imageUrl) {
      bgStyle = 'background-image:url(' + esc(pc.imageUrl) + ');';
    } else if (pc.imageFallback) {
      bgStyle = 'background:' + esc(pc.imageFallback) + ';';
    } else {
      bgStyle = 'background:linear-gradient(135deg,#1a2a4a,#0a1525);';
    }
    html = '<div class="projector-preview type-image" style="' + bgStyle + '">';
    html += '<div class="preview-overlay" style="background:rgba(0,0,0,' + (overlay / 100) + ')"></div>';
    if (pc.captionEst) {
      html += '<div class="preview-caption">' + esc(pc.captionEst) + '</div>';
    }
    html += '</div>';

  } else if (projector === 'image-keytext') {
    const overlay = pc.overlay != null ? pc.overlay : 60;
    let bgStyle = '';
    if (pc.imageUrl) {
      bgStyle = 'background-image:url(' + esc(pc.imageUrl) + ');';
    } else if (pc.imageFallback) {
      bgStyle = 'background:' + esc(pc.imageFallback) + ';';
    } else {
      bgStyle = 'background:linear-gradient(135deg,#1a2a4a,#0a1525);';
    }
    html = '<div class="projector-preview type-image-keytext" style="' + bgStyle + '">';
    html += '<div class="preview-overlay" style="background:rgba(0,0,0,' + (overlay / 100) + ')"></div>';
    html += '<div class="preview-keytext">' + esc(pc.textEst || '') + '</div>';
    html += '</div>';
  }

  return html;
}

// =============================================================
//  PROJECTOR CONTENT FIELDS
// =============================================================
function buildProjectorFields(slide, i) {
  const projector = slide.projector || 'none';
  if (projector === 'none' || projector === 'inherit') return '';

  const pc = slide.projectorContent || {};
  let html = '<div class="projector-fields">';
  html += '<div class="projector-fields-title">Projektori sisu (' + esc(projector) + ')</div>';

  if (projector === 'section') {
    html += pcField(i, 'sectionEst', 'Sektsioon ET', pc.sectionEst);
    html += pcField(i, 'sectionRus', 'Sektsioon RU', pc.sectionRus);

  } else if (projector === 'bible') {
    html += pcField(i, 'reference', 'Viide ET', pc.reference);
    html += pcField(i, 'referenceRus', 'Viide RU', pc.referenceRus);
    html += pcField(i, 'referenceEng', 'Viide EN', pc.referenceEng);
    html += pcField(i, 'textEst', 'Tekst ET', pc.textEst);
    html += pcField(i, 'textRus', 'Tekst RU', pc.textRus);
    html += pcField(i, 'textEng', 'Tekst EN', pc.textEng);

  } else if (projector === 'keytext') {
    html += pcField(i, 'textEst', 'Tekst ET', pc.textEst);
    html += pcField(i, 'textRus', 'Tekst RU', pc.textRus);
    html += pcField(i, 'subEst', 'Alam ET', pc.subEst);
    html += pcField(i, 'subRus', 'Alam RU', pc.subRus);

  } else if (projector === 'image') {
    html += imageUploadRow(i);
    html += pcField(i, 'imageUrl', 'Pildi URL', pc.imageUrl);
    html += pcField(i, 'imageFallback', 'Fallback', pc.imageFallback);
    html += pcField(i, 'captionEst', 'Allkiri ET', pc.captionEst);
    html += pcField(i, 'captionRus', 'Allkiri RU', pc.captionRus);
    html += overlaySlider(i, pc.overlay);

  } else if (projector === 'image-keytext') {
    html += imageUploadRow(i);
    html += pcField(i, 'imageUrl', 'Pildi URL', pc.imageUrl);
    html += pcField(i, 'imageFallback', 'Fallback', pc.imageFallback);
    html += overlaySlider(i, pc.overlay);
    html += pcField(i, 'textEst', 'Tekst ET', pc.textEst);
    html += pcField(i, 'textRus', 'Tekst RU', pc.textRus);
  }

  html += '</div>';
  return html;
}

function pcField(i, key, label, value) {
  return '<div class="pc-field-row">' +
    '<span class="pc-label">' + esc(label) + '</span>' +
    '<textarea class="pc-input" data-pci="' + i + '" data-pc="' + key + '" rows="1">' + esc(value || '') + '</textarea>' +
  '</div>';
}

function overlaySlider(i, value) {
  const val = value != null ? value : 60;
  return '<div class="overlay-slider-row">' +
    '<label>Overlay</label>' +
    '<input type="range" min="0" max="100" value="' + val + '" data-overlay="1" data-overlay-i="' + i + '">' +
    '<span class="overlay-value">' + val + '%</span>' +
  '</div>';
}

function imageUploadRow(i) {
  return '<div class="upload-row">' +
    '<button class="upload-btn" data-upload-trigger data-upload-i="' + i + '">Laadi pilt \u00FCles</button>' +
    '<button class="upload-cancel-btn hidden" data-upload-cancel="' + i + '">Katkesta</button>' +
    '<span class="upload-status" data-upload-status="' + i + '"></span>' +
    '<input type="file" accept="image/*" class="hidden" data-upload-input="' + i + '">' +
  '</div>' +
  '<div class="upload-progress" data-upload-progress="' + i + '">' +
    '<div class="upload-progress-bar"></div>' +
  '</div>' +
  '<div class="upload-error hidden" data-upload-error="' + i + '"></div>';
}

// =============================================================
//  FLOW INDICATOR
// =============================================================
function buildFlowIndicator(globalIndex) {
  let html = '';
  const currentSlide = slides[globalIndex];
  const nextSlide = globalIndex < slides.length - 1 ? slides[globalIndex + 1] : null;
  const prevSlide = globalIndex > 0 ? slides[globalIndex - 1] : null;

  // Current is "none" but next has keytext
  if ((currentSlide.projector === 'none' || currentSlide.projector === 'inherit') && nextSlide && nextSlide.projector === 'keytext') {
    html += '<div class="flow-indicator flow-next">&rarr; keytext j\u00E4rgmisel slaidil</div>';
  }

  // Current has keytext and text matches previous slide
  if (currentSlide.projector === 'keytext' && currentSlide.projectorContent) {
    const ktEst = currentSlide.projectorContent.textEst || '';
    if (prevSlide && ktEst) {
      const prevEst = (prevSlide.estonian || '').replace(/[.,!?"\u201e\u201d]/g, '').trim();
      const ktClean = ktEst.replace(/[.,!?"\u201e\u201d]/g, '').trim();
      if (prevEst && ktClean && prevEst.indexOf(ktClean) !== -1) {
        html += '<div class="flow-indicator flow-prev">&larr; keytext eelmisest slaidist</div>';
      }
    }
  }

  // Span source indicator
  const spanVal = typeof currentSlide.projectorSpan === 'number' ? currentSlide.projectorSpan : (currentSlide.projectorSpan === true ? 2 : 1);
  if (spanVal > 1 && currentSlide.projector && currentSlide.projector !== 'none' && currentSlide.projector !== 'inherit') {
    html += '<div class="span-badge span-source">span &rarr; +' + (spanVal - 1) + ' slaidi</div>';
  }

  return html;
}

// =============================================================
//  EXPORT / IMPORT
// =============================================================
function buildJSON() {
  readEditorMeta();

  const cleanSlides = slides.map((s, idx) => {
    const obj = {};
    obj.id = idx;
    if (s.type) obj.type = s.type;
    if (s.section) obj.section = s.section;
    if (s.estonian) obj.estonian = s.estonian;
    if (s.russian) obj.russian = s.russian;
    obj.projector = s.projector || 'none';
    if (s.hint) obj.hint = s.hint;
    if (s.hidden) obj.hidden = s.hidden;
    const spanNum = typeof s.projectorSpan === 'number' ? s.projectorSpan : (s.projectorSpan === true ? 2 : 1);
    if (spanNum > 1) obj.projectorSpan = spanNum;

    if (s.projectorContent && Object.keys(s.projectorContent).length > 0) {
      const pc = {};
      Object.keys(s.projectorContent).forEach(k => {
        const v = s.projectorContent[k];
        if (v !== '' && v !== null && v !== undefined) {
          pc[k] = v;
        }
      });
      if (Object.keys(pc).length > 0) {
        obj.projectorContent = pc;
      }
    }

    return obj;
  });

  return JSON.stringify({ meta: meta, slides: cleanSlides }, null, 2);
}

document.getElementById('btnExport').addEventListener('click', () => {
  const json = buildJSON();
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (currentPresId || 'slides') + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importInput').click();
});

document.getElementById('importInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      meta = data.meta || {};
      slides = ensureArray(data.slides);
      collapsedSections = {};
      renderEditorMeta();
      renderEditorTitle();
      renderSlides();
      markDirty();
    } catch (err) {
      alert('Vigane JSON fail: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// =============================================================
//  KEYBOARD SHORTCUTS
// =============================================================
document.addEventListener('keydown', e => {
  // Ctrl+Shift+N: Add new slide at end (only in editor view)
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'N') {
    if (!document.getElementById('viewEditor').classList.contains('active')) return;
    e.preventDefault();
    const lastSection = slides.length > 0 ? slides[slides.length - 1].section : '';
    slides.push({
      type: 'normal',
      section: lastSection,
      estonian: '',
      russian: '',
      projector: 'none',
      projectorSpan: false
    });
    collapsedSections[lastSection] = false;
    markDirty();
    renderSlides();
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }
});

// =============================================================
//  INITIAL RENDER
// =============================================================
renderPresList();
