<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Armulaud – T&otilde;lkija</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0b0f1a;
  --surface: rgba(255,255,255,0.05);
  --border:  rgba(201,165,50,0.18);
  --text:    #f0e8d2;
  --dim:     rgba(240,232,210,0.4);
  --gold:    #c9a532;
  --blue:    #4a8fdf;
  --green:   #3dd68c;
  --red:     #e05555;
  --section: #5a9fd4;
}

html, body {
  height: 100%;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(20,40,80,0.7) 0%, transparent 70%),
    #0b0f1a;
}

/* --- STATUS BAR --- */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.status-left {
  display: flex;
  align-items: center;
  gap: 7px;
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
.status-dot.firebase { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
.status-dot.offline  { background: var(--red);  box-shadow: 0 0 6px var(--red);  }
.status-dot.waiting  {
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
  animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.status-text {
  font-size: 0.7rem;
  color: var(--dim);
  letter-spacing: 0.04em;
}

.slide-counter-badge {
  font-size: 0.75rem;
  color: var(--gold);
  background: rgba(201,165,50,0.12);
  border: 1px solid rgba(201,165,50,0.25);
  border-radius: 12px;
  padding: 2px 10px;
  letter-spacing: 0.05em;
}

/* --- MAIN: two halves --- */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Current slide: top 50% */
.current-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6px 12px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.section-badge {
  font-size: 0.6rem;
  color: var(--section);
  background: rgba(90,159,212,0.08);
  border: 1px solid rgba(90,159,212,0.2);
  border-radius: 12px;
  padding: 2px 8px;
  align-self: center;
  margin-bottom: 4px;
  letter-spacing: 0.06em;
}

.slide-current {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 9vw, 4.5rem);
  font-weight: 400;
  line-height: 1.35;
  color: var(--text);
  transition: opacity 0.2s ease;
}
.slide-current.is-section {
  font-size: clamp(2.4rem, 8vw, 3.8rem);
  font-weight: 600;
  color: var(--gold);
  text-align: center;
}
.slide-current.is-bible {
  font-style: italic;
  color: #ddd0a8;
  font-size: clamp(1.6rem, 5.5vw, 2.8rem);
  line-height: 1.35;
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  flex-shrink: 0;
  position: relative;
}
.divider::after {
  content: '\2193';
  position: absolute;
  top: -9px; left: 50%;
  transform: translateX(-50%);
  background: #0b0f1a;
  color: rgba(201,165,50,0.3);
  font-size: 11px;
  padding: 0 6px;
}

/* Next slide: bottom 50% */
.preview-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6px 12px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.preview-label {
  font-size: 0.5rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.15);
  margin-bottom: 6px;
}

.slide-preview {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 7vw, 3.2rem);
  font-weight: 300;
  line-height: 1.35;
  color: rgba(240,232,210,0.35);
  transition: opacity 0.2s ease;
}
.slide-preview.is-section {
  color: rgba(201,165,50,0.25);
}
.slide-preview.is-bible {
  font-style: italic;
  font-size: clamp(1.2rem, 4vw, 2rem);
}

/* Progress bar */
.progress-bar {
  height: 2px;
  background: rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(201,165,50,0.3), var(--gold));
  transition: width 0.35s ease;
}

.fade { opacity: 0 !important; }
</style>
</head>
<body>

<!-- Status bar -->
<div class="statusbar">
  <div class="status-left">
    <div class="status-dot waiting" id="statusDot"></div>
    <span class="status-text" id="statusText">Ootab k&otilde;nelejat&hellip;</span>
  </div>
  <div class="slide-counter-badge" id="counterBadge">— / —</div>
</div>

<div class="content-area">
  <!-- Current slide: top half -->
  <div class="current-zone">
    <div class="section-badge" id="sectionLabel">—</div>
    <div class="slide-current" id="slideCurrent">Ootab k&otilde;nelejat&hellip;</div>
  </div>

  <div class="divider"></div>

  <!-- Next slide: bottom half -->
  <div class="preview-zone">
    <div class="preview-label">J&auml;rgmine</div>
    <div class="slide-preview" id="slidePreview">—</div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- Slides loader -->
<script type="module" src="js/slides-loader.js"></script>

<!-- Firebase v12 + listener logic -->
<script type="module">
import { db } from './js/firebase-config.js';
import { ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

let lastIndex = -1;

const el = {
  current:  document.getElementById('slideCurrent'),
  preview:  document.getElementById('slidePreview'),
  counter:  document.getElementById('counterBadge'),
  progress: document.getElementById('progressFill'),
  section:  document.getElementById('sectionLabel'),
  dot:      document.getElementById('statusDot'),
  text:     document.getElementById('statusText'),
};

// Find nearest non-section slide at or before idx
function findTranslatable(idx) {
  for (var i = idx; i >= 0; i--) {
    if (SLIDES[i].type !== 'section-header') return i;
  }
  return -1;
}

// Find nearest non-section slide after idx
function findNextTranslatable(idx) {
  for (var i = idx + 1; i < SLIDES.length; i++) {
    if (SLIDES[i].type !== 'section-header') return i;
  }
  return -1;
}

function renderSlide(speakerIdx) {
  if (speakerIdx === lastIndex) return;
  lastIndex = speakerIdx;
  if (speakerIdx < 0 || speakerIdx >= SLIDES.length) return;

  // Translator sees one slide behind the speaker (skipping sections)
  var curIdx = findTranslatable(speakerIdx - 1);
  var nextIdx = curIdx >= 0 ? findNextTranslatable(curIdx) : findTranslatable(speakerIdx);

  var slide = curIdx >= 0 ? SLIDES[curIdx] : null;
  var nextSlide = nextIdx >= 0 ? SLIDES[nextIdx] : null;

  el.current.classList.add('fade');
  el.preview.classList.add('fade');

  setTimeout(() => {
    // Current slide in RUSSIAN (one behind speaker)
    if (slide) {
      el.current.textContent = slide.russian;
      el.current.className = 'slide-current';
      if (slide.type === 'bible') el.current.classList.add('is-bible');
    } else {
      el.current.textContent = '\u041e\u0436\u0438\u0434\u0430\u043d\u0438\u0435\u2026';
      el.current.className = 'slide-current';
    }

    // Next slide preview
    if (nextSlide) {
      el.preview.textContent = nextSlide.russian;
      el.preview.className = 'slide-preview';
      if (nextSlide.type === 'bible') el.preview.classList.add('is-bible');
    } else {
      el.preview.textContent = '\u2014 \u041a\u043e\u043d\u0435\u0446 \u2014';
      el.preview.className = 'slide-preview';
    }

    // Metadata
    el.counter.textContent  = (speakerIdx + 1) + ' / ' + SLIDES.length;
    el.progress.style.width = ((speakerIdx + 1) / SLIDES.length * 100) + '%';
    el.section.textContent  = SLIDES[speakerIdx].section;

    el.current.classList.remove('fade');
    el.preview.classList.remove('fade');
  }, 180);
}

function setConnected(mode) {
  el.dot.className = 'status-dot';
  if (mode === 'firebase') {
    el.dot.classList.add('firebase');
    el.text.textContent = 'Firebase \u2013 reaalajas';
  } else if (mode === 'broadcast') {
    el.text.textContent = 'Lokaalne s\u00fcnk';
  } else {
    el.dot.classList.add('offline');
    el.text.textContent = 'Offline';
  }
}

function updateTitle() {
  const m = window.SLIDES_META;
  if (m && m.date) {
    document.title = 'Armulaud ' + m.date + ' \u2013 T\u00f5lkija';
  }
}

SLIDES_READY.then(() => {
  updateTitle();

  try {
    const bc = new BroadcastChannel('armulaud-2026');
    bc.onmessage = (e) => {
      setConnected('broadcast');
      renderSlide(e.data.currentSlide);
    };
  } catch(e) {}

  const activeId = window.ACTIVE_PRESENTATION_ID;
  if (activeId) {
    const slideRef = ref(db, 'presentations/' + activeId + '/currentSlide');
    onValue(slideRef, (snap) => {
      const idx = snap.val();
      if (idx !== null) {
        setConnected('firebase');
        renderSlide(idx);
      }
    });
  }
});

if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').catch(() => {});
}

</script>
</body>
</html>
