<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armulaud – K&otilde;neleja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0b0f1a;
  --surface:  rgba(255,255,255,0.04);
  --border:   rgba(201,165,50,0.18);
  --text:     #f0e8d2;
  --dim:      rgba(240,232,210,0.42);
  --gold:     #c9a532;
  --gold-dim: rgba(201,165,50,0.35);
  --blue:     #4a8fdf;
  --green:    #3dd68c;
  --red:      #e05555;
  --section:  #5a9fd4;
}

html, body {
  height: 100%;
  font-family: 'Lato', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
}

body {
  display: grid;
  grid-template-rows: 48px 3px 1fr 56px;
  height: 100vh;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(30,55,100,0.6) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(20,35,70,0.5) 0%, transparent 60%),
    #0b0f1a;
}

/* --- HEADER --- */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: rgba(0,0,0,0.35);
  border-bottom: 1px solid var(--border);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px 3px 7px;
  flex-shrink: 0;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  transition: all 0.5s;
}
.status-dot.firebase  { background: var(--blue);  box-shadow: 0 0 6px var(--blue);  }
.status-dot.offline   { background: var(--red);   box-shadow: 0 0 6px var(--red);   }
.status-label { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.05em; }

.section-badge {
  font-size: 0.72rem;
  color: var(--section);
  background: rgba(90,159,212,0.12);
  border: 1px solid rgba(90,159,212,0.3);
  border-radius: 20px;
  padding: 3px 12px;
  max-width: 260px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.spacer { flex: 1; }

.timer-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.timer-display {
  font-family: 'Lato', monospace;
  font-size: 1.3rem;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 0.12em;
  min-width: 68px;
  text-align: right;
}
.timer-display.warning { color: var(--red); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.btn-sm {
  background: rgba(201,165,50,0.12);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: 'Lato', sans-serif;
  letter-spacing: 0.05em;
  transition: all 0.2s;
}
.btn-sm:hover { background: rgba(201,165,50,0.25); }

/* --- PROGRESS --- */
.progress-track {
  background: rgba(255,255,255,0.08);
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(201,165,50,0.3) 0%, var(--gold) 100%);
  transition: width 0.35s ease;
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -1px; top: 0; bottom: 0;
  width: 2px;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
}

/* --- MAIN --- */
main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Current slide: top 55% */
.slide-wrapper {
  flex: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 48px;
}

/* Presenter hint */
.hint-bar {
  font-size: 0.75rem;
  color: rgba(201,165,50,0.7);
  background: rgba(201,165,50,0.08);
  border: 1px solid rgba(201,165,50,0.15);
  border-radius: 6px;
  padding: 4px 14px;
  margin-bottom: 12px;
  letter-spacing: 0.04em;
  font-style: italic;
  text-align: center;
  align-self: center;
  max-width: 600px;
  transition: opacity 0.3s ease;
}
.hint-bar:empty { display: none; }

.slide-current {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 3.8vw, 4rem);
  font-weight: 400;
  line-height: 1.5;
  color: var(--text);
  transition: opacity 0.2s ease;
  width: 100%;
  text-align: center;
}
.slide-current.is-section {
  font-size: clamp(2rem, 3.4vw, 3.6rem);
  font-weight: 600;
  color: var(--gold);
  padding: 16px 24px;
  border: 1px solid rgba(201,165,50,0.25);
  border-radius: 8px;
  background: rgba(201,165,50,0.06);
}
.slide-current.is-bible {
  font-style: italic;
  color: #ddd0a8;
}

/* Divider with projector preview */
.divider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 48px;
  flex-shrink: 0;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
}

.divider-label {
  color: var(--gold-dim);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Projector mini-preview */
.projector-preview {
  width: 120px;
  height: 68px;
  border-radius: 4px;
  border: 1px solid rgba(74,143,223,0.3);
  background: #060b14;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  display: none;
}
.projector-preview.visible { display: block; }

.pp-label {
  position: absolute;
  top: 3px; left: 5px;
  font-size: 0.45rem;
  color: var(--section);
  letter-spacing: 0.08em;
  opacity: 0.7;
}

/* Preview content types */
.pp-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 8px 6px;
  background: radial-gradient(ellipse at 50% 0%, rgba(30,70,140,0.5) 0%, transparent 70%), #070c18;
}
.pp-section-est {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.55rem;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
}
.pp-section-rus {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.4rem;
  color: rgba(245,238,216,0.5);
  font-style: italic;
  margin-top: 2px;
}

.pp-bible {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 6px;
  background: radial-gradient(ellipse at 50% 50%, rgba(30,60,120,0.4) 0%, transparent 70%), #060b14;
}
.pp-bible-ref {
  font-size: 0.4rem;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}
.pp-bible-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.4rem;
  font-style: italic;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.pp-image {
  width: 100%;
  height: 100%;
  background-size: cover !important;
  background-position: center !important;
  background-repeat: no-repeat;
}

.pp-keytext {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 6px;
  background: radial-gradient(ellipse at 50% 50%, rgba(25,55,110,0.4) 0%, transparent 70%), #060b14;
}
.pp-keytext-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text);
  text-align: center;
}
.pp-keytext-sub {
  font-size: 0.35rem;
  color: rgba(245,238,216,0.5);
  font-style: italic;
  margin-top: 2px;
}

/* Next slide: bottom 45% */
.preview-wrapper {
  flex: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 12px 48px 16px;
}
.preview-wrapper .projector-preview {
  width: 140px;
  height: 79px;
  flex-shrink: 0;
}

.slide-preview {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.4rem, 2.4vw, 2.6rem);
  font-weight: 300;
  line-height: 1.45;
  color: var(--dim);
  transition: opacity 0.2s ease;
  width: 100%;
  text-align: center;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.slide-preview.is-section {
  color: rgba(201,165,50,0.38);
}
.slide-preview.is-bible { font-style: italic; }

/* --- FOOTER --- */
footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 0 24px;
  background: rgba(0,0,0,0.35);
  border-top: 1px solid var(--border);
}

.btn-nav {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 0 28px;
  height: 38px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: 'Lato', sans-serif;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  min-width: 130px;
}
.btn-nav:hover:not(:disabled) {
  background: rgba(201,165,50,0.15);
  border-color: var(--gold-dim);
  color: var(--gold);
}
.btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }

.slide-counter {
  font-size: 0.95rem;
  color: var(--gold);
  min-width: 80px;
  text-align: center;
  letter-spacing: 0.08em;
}

.fullscreen-hint {
  position: fixed;
  bottom: 70px;
  right: 16px;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.1em;
}

.fade { opacity: 0 !important; }
</style>
</head>
<body>

<header>
  <div class="status-pill">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Lokaalne</span>
  </div>
  <div class="section-badge" id="sectionBadge">—</div>
  <div class="spacer"></div>
  <div class="timer-wrap">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <button class="btn-sm" id="btnTimer">&#9654; Start</button>
    <button class="btn-sm" id="btnReset">&#8634;</button>
  </div>
</header>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<main>
  <div class="slide-wrapper">
    <div class="hint-bar" id="hintBar"></div>
    <div class="slide-current" id="slideCurrent"></div>
  </div>

  <div class="divider-row">
    <div class="divider-line"></div>
    <span class="divider-label">j&auml;rgmine</span>
    <div class="projector-preview" id="projectorPreview"></div>
    <div class="divider-line"></div>
  </div>

  <div class="preview-wrapper">
    <div class="slide-preview" id="slidePreview"></div>
    <div class="projector-preview" id="projectorPreviewNext"></div>
  </div>
</main>

<footer>
  <button class="btn-nav" id="btnPrev">&larr; Eelmine</button>
  <div class="slide-counter" id="slideCounter">— / —</div>
  <button class="btn-nav" id="btnNext">J&auml;rgmine &rarr;</button>
</footer>

<div class="fullscreen-hint">F11 = t&auml;isekraan &middot; &larr; &rarr; = navigeeri &middot; Space = edasi</div>

<script type="module" src="js/slides-loader.js"></script>

<script type="module">
import { db } from './js/firebase-config.js';
import { ref, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const Sync = {
  channel: null,
  init() {
    try { this.channel = new BroadcastChannel('armulaud-2026'); } catch(e) {}
    this.updateStatusUI('firebase');
  },
  send(slideIndex) {
    const activeId = window.ACTIVE_PRESENTATION_ID;
    const payload = { currentSlide: slideIndex, ts: Date.now() };
    if (this.channel) this.channel.postMessage(payload);
    if (activeId) {
      set(ref(db, 'presentations/' + activeId + '/currentSlide'), slideIndex).catch(err => {
        console.error('Firebase write error:', err);
        this.updateStatusUI('offline');
      });
      set(ref(db, 'presentations/' + activeId + '/ts'), Date.now()).catch(() => {});
    }
  },
  updateStatusUI(mode) {
    const dot   = document.getElementById('statusDot');
    const label = document.getElementById('statusLabel');
    dot.className = 'status-dot';
    if (mode === 'firebase') { dot.classList.add('firebase'); label.textContent = 'Firebase'; }
    else if (mode === 'offline') { dot.classList.add('offline'); label.textContent = 'Offline'; }
    else { label.textContent = 'Lokaalne'; }
  }
};

let currentIdx = 0;

const el = {
  current:  document.getElementById('slideCurrent'),
  preview:  document.getElementById('slidePreview'),
  counter:  document.getElementById('slideCounter'),
  progress: document.getElementById('progressFill'),
  section:  document.getElementById('sectionBadge'),
  hintBar:  document.getElementById('hintBar'),
  ppBox:    document.getElementById('projectorPreview'),
  ppNext:   document.getElementById('projectorPreviewNext'),
  btnPrev:  document.getElementById('btnPrev'),
  btnNext:  document.getElementById('btnNext'),
};

function renderProjectorPreview(slide, box) {
  if (!box) box = el.ppBox;
  if (!slide || !slide.projector || slide.projector === 'none') {
    box.className = 'projector-preview';
    box.innerHTML = '';
    return;
  }
  box.className = 'projector-preview visible';
  var c = slide.projectorContent || {};

  switch (slide.projector) {
    case 'section': {
      var parts = (c.sectionEst || '').match(/^(\d+)\.\s+(.+)$/);
      box.innerHTML =
        '<div class="pp-label">PROJEKTOR</div>' +
        '<div class="pp-section">' +
          '<div class="pp-section-est">' + (parts ? parts[2] : (c.sectionEst || '')) + '</div>' +
          '<div class="pp-section-rus">' + (c.sectionRus || '') + '</div>' +
        '</div>';
      break;
    }
    case 'bible': {
      box.innerHTML =
        '<div class="pp-label">PROJEKTOR</div>' +
        '<div class="pp-bible">' +
          '<div class="pp-bible-ref">' + (c.reference || '') + '</div>' +
          '<div class="pp-bible-text">' + (c.textEst || '') + '</div>' +
        '</div>';
      break;
    }
    case 'image': {
      var url = c.imageUrl || '';
      var fallback = c.imageFallback || '#111';
      box.innerHTML =
        '<div class="pp-label" style="color:#fff;">PROJEKTOR</div>' +
        '<div class="pp-image"></div>';
      var ppImg = box.querySelector('.pp-image');
      ppImg.style.backgroundImage = fallback;
      if (url) {
        var img = new Image();
        img.onload = function() {
          if (ppImg) {
            ppImg.style.backgroundImage = "url('" + url + "')";
            ppImg.style.backgroundSize = 'cover';
            ppImg.style.backgroundPosition = 'center';
          }
        };
        img.src = url;
      }
      break;
    }
    case 'keytext': {
      box.innerHTML =
        '<div class="pp-label">PROJEKTOR</div>' +
        '<div class="pp-keytext">' +
          '<div class="pp-keytext-main">' + (c.textEst || '') + '</div>' +
          '<div class="pp-keytext-sub">' + (c.textRus || '') + '</div>' +
        '</div>';
      break;
    }
    case 'image-keytext': {
      var url = c.imageUrl || '';
      var fallback = c.imageFallback || '#111';
      var overlayPct = c.overlay !== undefined ? c.overlay : 60;
      box.innerHTML =
        '<div class="pp-label" style="color:#fff;">PROJEKTOR</div>' +
        '<div class="pp-image" style="position:relative;width:100%;height:100%;">' +
          '<div style="position:absolute;inset:0;background:rgba(4,8,18,' + (overlayPct/100) + ');z-index:1;"></div>' +
          '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;padding:4px;">' +
            '<div style="font-family:Cormorant Garamond,serif;font-size:0.5rem;font-weight:600;color:#f5eed8;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,0.5);">' + (c.textEst || '') + '</div>' +
            '<div style="font-family:Cormorant Garamond,serif;font-size:0.35rem;color:rgba(245,238,216,0.7);font-style:italic;text-align:center;margin-top:1px;">' + (c.textRus || '') + '</div>' +
          '</div>' +
        '</div>';
      var ppImg = box.querySelector('.pp-image');
      ppImg.style.backgroundImage = fallback;
      if (url) {
        var img = new Image();
        img.onload = function() {
          if (ppImg) {
            ppImg.style.backgroundImage = "url('" + url + "')";
            ppImg.style.backgroundSize = 'cover';
            ppImg.style.backgroundPosition = 'center';
          }
        };
        img.src = url;
      }
      break;
    }
  }
}

function showSlide(n, animate) {
  if (animate === undefined) animate = true;
  if (n < 0 || n >= SLIDES.length) return;
  currentIdx = n;

  var slide     = SLIDES[n];
  var nextSlide = SLIDES[n + 1] || null;

  var doUpdate = function() {
    el.current.textContent = slide.estonian;
    el.current.className = 'slide-current';
    if (slide.type === 'section-header') el.current.classList.add('is-section');
    if (slide.type === 'bible')          el.current.classList.add('is-bible');

    if (nextSlide) {
      el.preview.textContent = nextSlide.estonian;
      el.preview.className = 'slide-preview';
      if (nextSlide.type === 'section-header') el.preview.classList.add('is-section');
      if (nextSlide.type === 'bible')          el.preview.classList.add('is-bible');
    } else {
      el.preview.textContent = '\u2014 L\u00f5pp \u00b7 \u041a\u043e\u043d\u0435\u0446 \u2014';
      el.preview.className = 'slide-preview';
    }

    renderProjectorPreview(slide, el.ppBox);
    renderProjectorPreview(nextSlide, el.ppNext);

    el.counter.textContent  = (n + 1) + ' / ' + SLIDES.length;
    el.progress.style.width = ((n + 1) / SLIDES.length * 100) + '%';
    el.section.textContent  = slide.section;

    // Find current hint (look backward for most recent hint)
    var hint = '';
    for (var h = n; h >= 0; h--) {
      if (SLIDES[h].hint) { hint = SLIDES[h].hint; break; }
    }
    el.hintBar.textContent = hint;
    el.btnPrev.disabled = n === 0;
    el.btnNext.disabled = n === SLIDES.length - 1;
  };

  if (animate) {
    el.current.classList.add('fade');
    el.preview.classList.add('fade');
    setTimeout(function() {
      doUpdate();
      el.current.classList.remove('fade');
      el.preview.classList.remove('fade');
    }, 180);
  } else {
    doUpdate();
  }

  Sync.send(n);
}

document.addEventListener('keydown', function(e) {
  if (['ArrowRight', ' ', 'PageDown'].includes(e.key)) { e.preventDefault(); showSlide(currentIdx + 1); }
  if (['ArrowLeft',  'PageUp'       ].includes(e.key)) { e.preventDefault(); showSlide(currentIdx - 1); }
  if (e.key === 'Home') showSlide(0);
  if (e.key === 'End')  showSlide(SLIDES.length - 1);
});

el.btnNext.addEventListener('click', function() { showSlide(currentIdx + 1); });
el.btnPrev.addEventListener('click', function() { showSlide(currentIdx - 1); });

// Timer
var timerInterval = null, timerSec = 0, timerRunning = false;
var timerWarning = 420; // default 7 min, overridden by meta.timerPreset
var btnTimer = document.getElementById('btnTimer');
var btnReset = document.getElementById('btnReset');
var timerEl  = document.getElementById('timerDisplay');

function fmtTime(s) {
  var m = Math.floor(s / 60), sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

btnTimer.addEventListener('click', function() {
  timerRunning = !timerRunning;
  if (timerRunning) {
    timerInterval = setInterval(function() {
      timerSec++;
      timerEl.textContent = fmtTime(timerSec);
      timerEl.className = 'timer-display' + (timerSec >= timerWarning ? ' warning' : '');
    }, 1000);
    btnTimer.textContent = '\u23f8 Peata';
  } else {
    clearInterval(timerInterval);
    btnTimer.textContent = '\u25b6 J\u00e4tka';
  }
});

btnReset.addEventListener('click', function() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSec = 0;
  timerEl.textContent = '00:00';
  timerEl.className = 'timer-display';
  btnTimer.textContent = '\u25b6 Start';
});

function updateTitle() {
  var m = window.SLIDES_META;
  if (m && m.date) document.title = 'Armulaud ' + m.date + ' \u2013 K\u00f5neleja';
}

SLIDES_READY.then(function() {
  updateTitle();
  // Load timer preset from meta
  var m = window.SLIDES_META;
  if (m && m.timerPreset && m.timerPreset > 0) {
    timerWarning = m.timerPreset;
  }
  Sync.init();
  showSlide(0, false);
});

</script>
</body>
</html>
